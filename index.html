<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKYO DONGE แม่สาย</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f5f5}
.container{max-width:700px;margin:auto;background:#fff;min-height:100vh}
.header{text-align:center;padding:20px;background:#fff}
.logo{width:120px}
h1{margin:5px 0;color:#e53935}
.subtitle{color:#666}
.food-card{background:#fff;margin:12px;border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.food-image{width:100%;height:220px;object-fit:cover}
.food-body{padding:15px}
.food-price{font-size:24px;font-weight:bold;color:#00B14F}
.qty button{width:40px;height:40px;border:none;border-radius:50%;background:#00B14F;color:#fff;font-size:24px}
.qty{display:flex;gap:10px;align-items:center}
.form{padding:15px}
input,textarea{width:100%;padding:12px;margin:6px 0;box-sizing:border-box}
.cart{position:sticky;bottom:0;background:#00B14F;color:#fff;padding:15px;text-align:center;font-size:24px;font-weight:bold}
.submit{width:100%;padding:15px;border:none;background:#ff6a00;color:#fff;font-size:20px;border-radius:10px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<img src="TOKYODONGE.jpg" class="logo">
<h1>TOKYO DONGE</h1>
<div class="subtitle">แม่สาย • อาหารดองสไตล์ญี่ปุ่น</div>
</div>

<div id="menu"></div>

<div class="form">
<h2>ข้อมูลลูกค้า</h2>
<input id="name" placeholder="ชื่อ">
<input id="phone" placeholder="เบอร์โทร">
<textarea id="address" placeholder="ที่อยู่จัดส่ง"></textarea>
<button class="submit" onclick="sendOrder()">สั่งซื้อ</button>
</div>

<div class="cart">ยอดรวม: <span id="total">0</span> บาท</div>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxmUldm9fwW8g_hUPBgpCCaDXQhys0HUFHPRZ_yU9XJGozv4IOkAfn1CX_jTdsSlS_1/exec";

const menuData=[
{name:"ข้าวหน้ากุ้ง&แซลมอนดอง",price:179,image:"salmonshrimp.jpg"},
{name:"ข้าวหน้ากุ้งดองเกาหลี",price:169,image:"shrimp.jpg"},
{name:"ข้าวหน้าแซลมอนดองเกาหลี",price:198,image:"salmon.jpg"},
{name:"สาหร่าย",price:30,image:"seaweed.jpg"}
];

let cart={};

function render(){
document.getElementById('menu').innerHTML=menuData.map((m,i)=>`
<div class="food-card">
<img src="${m.image}" class="food-image">
<div class="food-body">
<h3>${m.name}</h3>
<div class="food-price">฿${m.price}</div>
<div class="qty">
<button onclick="change(${i},-1)">-</button>
<span>${cart[i]||0}</span>
<button onclick="change(${i},1)">+</button>
</div>
</div>
</div>`).join('');
updateTotal();
}

function change(i,n){
cart[i]=(cart[i]||0)+n;
if(cart[i]<0) cart[i]=0;
render();
}

function updateTotal(){
let t=0;
menuData.forEach((m,i)=>t+=m.price*(cart[i]||0));
document.getElementById('total').innerText=t;
}

function sendOrder(){
const items=menuData.filter((m,i)=>(cart[i]||0)>0).map((m,i)=>`${m.name} x ${cart[i]||0}`).join(", ");
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
name:document.getElementById('name').value,
phone:document.getElementById('phone').value,
address:document.getElementById('address').value,
items:items
})
}).then(()=>alert("ส่งออเดอร์สำเร็จ"));
}
render();
</script>
</body>
</html>
