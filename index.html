<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOKYO DONG ORDER</title>
<style>
body{font-family:Arial;background:#f5f5f5;max-width:500px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:15px}
input,select,button{width:100%;padding:12px;margin:8px 0;box-sizing:border-box}
button{background:#16a34a;color:white;border:none;border-radius:10px;font-size:18px}
.price{font-size:28px;font-weight:bold;color:#16a34a}
</style>
</head>
<body>
<div class="card">
<h2>🍤 กุ้งดองเกาหลี</h2>
<div class="price">฿145</div>

<input id="name" placeholder="ชื่อ">
<input id="phone" placeholder="เบอร์โทร">
<input id="address" placeholder="ที่อยู่">

<label>น้ำจิ้มฟรี</label>
<select id="sauce">
<option>สีเขียวเผ็ดปกติ</option>
<option>สีแดงเผ็ดมาก</option>
<option>ไม่รับ</option>
</select>

<label>กระเทียมโทน</label>
<select id="garlic">
<option>รับ</option>
<option>ไม่รับ</option>
</select>

<label>จำนวน</label>
<input id="qty" type="number" value="1" min="1">

<button onclick="order()">สั่งซื้อ</button>
</div>

<script>
const WEBAPP="https://script.google.com/macros/s/AKfycbwPnL9wsILkRCIm4Hl2f6xMJKnjaohT4jUck2h_t-jcRt0L0osl4Xl9vgZCcV9imFgR/exec";

async function order(){
 try{
  const qty=parseInt(document.getElementById('qty').value||1);

  const response = await fetch(WEBAPP,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({
      name:document.getElementById('name').value,
      phone:document.getElementById('phone').value,
      address:document.getElementById('address').value,
      items:'กุ้งดองเกาหลี | น้ำจิ้ม:'+document.getElementById('sauce').value+' | กระเทียม:'+document.getElementById('garlic').value,
      quantity:qty,
      total:qty*145
    })
  });

  alert('ส่งออเดอร์แล้ว กรุณาตรวจสอบ Telegram และ Google Sheets');
 }catch(e){
  alert('ถ้าเปิดจากไฟล์ในเครื่อง จะทดสอบไม่ได้ ต้องอัปโหลดขึ้น GitHub Pages ก่อน');
 }
}
</script>
</body>
</html>
